<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QuizBob  -  Local Flashcard Manager</title>
<link rel="stylesheet" href="./style.css">
</head>
<body>

  <nav class="tabs" aria-label="Main views">
    <div class="tabs-inner">
      <div class="tabs-brand" aria-label="Brand">
        <img src="./qb.png" alt="QuizBob logo"><span class="logo-label">QuizBob</span>
      </div>

      <input type="checkbox" id="navToggle" class="nav-toggle" hidden>
      <label class="nav-toggle-label" for="navToggle" aria-label="Toggle navigation">
        <span></span>
        <span></span>
        <span></span>
      </label>

      <div class="tab-actions">
        <div class="tab-buttons">
          <button class="tab-btn active" data-view="editor">Editor</button>
          <button class="tab-btn" data-view="study">Study</button>
          <button class="tab-btn" data-view="quiz">Quiz</button>
        </div>
      </div>

      <div class="page-top">
        <button class="btn theme-btn" id="themeToggleBtn" title="Cycle theme">🌓 Theme</button>
      </div>

      <div class="mobile-nav" aria-label="Mobile navigation">
        <div class="tab-buttons">
          <button class="tab-btn active" data-view="editor">Editor</button>
          <button class="tab-btn" data-view="study">Study</button>
          <button class="tab-btn" data-view="quiz">Quiz</button>
        </div>
        <div class="page-top mobile-page-top">
          <button class="btn theme-btn" id="themeToggleBtnMobile" title="Cycle theme">🌓 Theme</button>
        </div>
      </div>
    </div>
  </nav>

  <main class="view-container">

    <!-- EDITOR VIEW -->
    <section id="view-editor" class="view active">
      <h2>Deck Creator</h2>

      <header class="topbar">
        <input id="deckTitle" class="deck-title-input" type="text" value="Flashcard Manager" aria-label="Deck name" placeholder="Deck name" title="Click to edit deck name">
        <div class="file-actions">
          <label class="btn btn-top" for="loadInput">Load JSON</label>
          <input type="file" id="loadInput" accept="application/json" hidden>
          <button class="btn btn-top" id="saveBtn">Save JSON</button>
        </div>
      </header>

      <form id="addCardForm" class="add-card-form">
        <input type="text" name="question" placeholder="Question" required>
        <input type="text" name="answer" placeholder="Answer" required>
        <button type="submit" class="btn btn-primary">Add Card</button>
      </form>

      <div class="table-scroll">
        <table class="card-table">
          <thead>
            <tr>
              <th>Question</th>
              <th>Answer</th>
              <th>Starred</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="editorTableBody">
            <!-- rows injected by JS -->
          </tbody>
        </table>
      </div>
    </section>

    <!-- STUDY VIEW -->
    <section id="view-study" class="view">
      <h2>Study Mode</h2>

      <div class="study-controls">
        <label class="filter-toggle">
          <input type="checkbox" id="filterStarredCheckbox">
          Filter by Starred Only
        </label>
        <span id="studyProgress" class="progress-label"></span>
      </div>

      <div id="studyCardArea" class="card-area">
        <div class="flashcard" id="flashcard">
          <div class="flashcard-face" id="flashcardFace">No cards to study</div>
        </div>
      </div>

      <div class="study-actions">
        <button class="btn" id="prevBtn">&larr; Prev</button>
        <button class="btn" id="flipBtn">Flip</button>
        <button class="btn" id="starBtn">&#9734; Star</button>
        <button class="btn" id="nextBtn">Next &rarr;</button>
      </div>
    </section>

    <!-- QUIZ VIEW -->
    <section id="view-quiz" class="view">
      <h2>Quiz Mode</h2>

      <div class="quiz-controls">
        <button class="btn btn-primary" id="startQuizBtn">Start / Restart Quiz</button>
        <span id="quizProgress" class="progress-label"></span>
      </div>

      <div id="quizArea" class="card-area">
        <p id="quizQuestion">Press "Start / Restart Quiz" to begin.</p>
      </div>

      <form id="quizForm" class="inline-form">
        <input type="text" id="quizAnswerInput" placeholder="Your answer" autocomplete="off">
        <button type="submit" class="btn btn-primary">Submit</button>
      </form>

      <div id="quizFeedback" class="feedback"></div>
      <div id="quizScore" class="progress-label"></div>

      <!-- Results list, shown when the quiz is finished -->
      <div id="quizResultsArea" class="quiz-results" style="display:none;"></div>

      <!-- Post-quiz actions, shown when the quiz is finished -->
      <div id="quizFinishActions" class="quiz-controls" style="display:none;">
        <button class="btn" id="retryMissedBtn">Retry Missed Questions</button>
        <button class="btn btn-primary" id="retryFullBtn">Retry Full Quiz</button>
      </div>
    </section>

  </main>

  <script src="./app.js"></script>
</body>
</html>
